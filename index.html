<!DOCTYPE html>
<html>
<head>
<title>SuperQA Ecommerce Test</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#ff3f6c;
color:white;
padding:15px;
text-align:center;
}

.page{
display:none;
padding:40px;
}

.active{
display:block;
}

.product{
background:white;
padding:20px;
width:200px;
border-radius:6px;
box-shadow:0 0 6px rgba(0,0,0,0.2);
}

button{
background:#ff3f6c;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
}

button:hover{
background:#e0315c;
}

input{
display:block;
margin-bottom:10px;
padding:8px;
width:250px;
}

#cartDrawer{
position:fixed;
right:-300px;
top:0;
width:300px;
height:100%;
background:white;
box-shadow:-2px 0 10px rgba(0,0,0,0.3);
padding:20px;
transition:0.4s;
}

</style>

<script>

function openProduct(){

document.getElementById("landingPage").classList.remove("active")
document.getElementById("productPage").classList.add("active")

}

function addToCart(){

document.getElementById("cartDrawer").style.right="0"

}

function goCheckout(){

document.getElementById("productPage").classList.remove("active")
document.getElementById("checkoutPage").classList.add("active")

}

function placeOrder(){

document.getElementById("checkoutPage").classList.remove("active")
document.getElementById("successPage").classList.add("active")

}

</script>

</head>

<body>

<header id="store-header">
SuperQA Fashion Store
</header>


<!-- LANDING PAGE -->

<div id="landingPage" class="page active">

<h2 id="landing-title">Trending Products</h2>

<div class="product" id="product-card">

<h3 id="product-name">Running Shoes</h3>

<p id="product-price">$59</p>

<button id="view-product" onclick="openProduct()">
view Product
</button>

</div>

</div>



<!-- PRODUCT PAGE -->

<div id="productPage" class="page">

<h2 id="product-detail-title">Running Shoes</h2>

<p id="product-description">
Comfort running shoes for daily workouts
</p>

<button id="add-to-cart" onclick="addToCart()">
Add to cart
</button>

</div>



<!-- CART DRAWER -->

<div id="cartDrawer">

<h3 id="cart-title">Cart</h3>

<p id="cart-product-name">Running Shoes</p>

<button id="checkout-btn" onclick="goCheckout()">
Check in
</button>

</div>



<!-- CHECKOUT PAGE -->

<div id="checkoutPage" class="page">

<h2 id="checkout-title">Checkout</h2>

<input id="name-input" placeholder="Full Name">

<input id="address-input" placeholder="Address">

<input id="city-input" placeholder="City">

<input id="phone-input" placeholder="Phone">

<button id="place-order-btn" onclick="placeOrder()">
Place Order
</button>

</div>



<!-- SUCCESS PAGE -->

<div id="successPage" class="page">

<h2 id="order-success-title">
Order Placed Successfully
</h2>

<p id="order-message">
Thank you for your purchase
</p>

</div>


</body>
</html>
