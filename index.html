<!DOCTYPE html>
<html>
<head>
<title>SuperQA Demo Store</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
margin:0;
}

header{
background:#ff3f6c;
color:white;
padding:15px;
text-align:center;
}

.container{
padding:30px;
}

.products{
display:flex;
gap:20px;
}

.product{
background:white;
padding:20px;
border-radius:6px;
width:200px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
text-align:center;
}

button{
background:#ff3f6c;
border:none;
color:white;
padding:10px 15px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#e0315c;
}

#cart{
display:none;
margin-top:30px;
background:white;
padding:20px;
}

#checkout{
display:none;
margin-top:30px;
background:white;
padding:20px;
}

input{
display:block;
margin-bottom:10px;
padding:8px;
width:250px;
}

</style>

<script>

function addToCart(product){

document.getElementById("cart").style.display="block"

document.getElementById("cart-product").innerText=product

}

function goCheckout(){

document.getElementById("checkout").style.display="block"

}

function placeOrder(){

alert("Order Placed Successfully")

}

</script>

</head>

<body>

<header id="header-title">
SuperQA Demo Fashion Store
</header>

<div class="container">

<h2 id="product-landing-title">Trending Products</h2>

<div class="products" id="product-list">

<div class="product" id="product-card-1">

<h3 class="product-name">Running Shoes</h3>

<p class="product-price">$59</p>

<button id="add-to-cart-btn-1" onclick="addToCart('Running Shoes')">
Add to Cart
</button>

</div>

<div class="product" id="product-card-2">

<h3 class="product-name">Denim Jacket</h3>

<p class="product-price">$89</p>

<button id="add-to-cart-btn-2" onclick="addToCart('Denim Jacket')">
Add to Cart
</button>

</div>

</div>


<div id="cart">

<h2 id="cart-title">Cart</h2>

<p>Product: <span id="cart-product"></span></p>

<button id="checkout-btn" onclick="goCheckout()">
Proceed to Checkout
</button>

</div>


<div id="checkout">

<h2 id="checkout-title">Checkout</h2>

<input id="name-field" placeholder="Full Name">

<input id="address-field" placeholder="Address">

<input id="city-field" placeholder="City">

<input id="phone-field" placeholder="Phone Number">

<button id="place-order-btn" onclick="placeOrder()">
Place Order
</button>

</div>

</div>

</body>
</html>
